services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-virtual_human}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "always", "--save", "60", "1"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  rag-service:
    image: python:3.11-slim
    working_dir: /app
    command: ["python", "-m", "uvicorn", "--app-dir", "services/rag-service", "main:app", "--host", "0.0.0.0", "--port", "8070"]
    environment:
      RAG_SERVICE_HOST: 0.0.0.0
      RAG_SERVICE_PORT: 8070
      RAG_SERVICE_BASE_URL: http://rag-service:8070
      RAG_CARDS_PATH: data/kb/knowledge_cards.jsonl
      RAG_DEFAULT_TOP_K: ${RAG_DEFAULT_TOP_K:-3}
      RAG_MAX_TOP_K: ${RAG_MAX_TOP_K:-5}
    ports:
      - "8070:8070"
    volumes:
      - ../..:/app
      - ../../.venv/lib/python3.11/site-packages:/usr/local/lib/python3.11/site-packages:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8070/health', timeout=5).read()"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  dialogue-service:
    image: python:3.11-slim
    working_dir: /app
    command: ["python", "-m", "uvicorn", "--app-dir", "services/dialogue-service", "main:app", "--host", "0.0.0.0", "--port", "8030"]
    env_file:
      - ../../.env
    environment:
      DIALOGUE_SERVICE_HOST: 0.0.0.0
      DIALOGUE_SERVICE_PORT: 8030
    ports:
      - "8030:8030"
    volumes:
      - ../..:/app
      - ../../.venv/lib/python3.11/site-packages:/usr/local/lib/python3.11/site-packages:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8030/health', timeout=5).read()"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  affect-service:
    image: python:3.11-slim
    working_dir: /app
    command: ["python", "-m", "uvicorn", "--app-dir", "services/affect-service", "main:app", "--host", "0.0.0.0", "--port", "8060"]
    environment:
      AFFECT_SERVICE_HOST: 0.0.0.0
      AFFECT_SERVICE_PORT: 8060
      AFFECT_SERVICE_BASE_URL: http://affect-service:8060
      AFFECT_CORS_ORIGINS: http://127.0.0.1:4173,http://localhost:4173,http://127.0.0.1:3000,http://localhost:3000
    ports:
      - "8060:8060"
    volumes:
      - ../..:/app
      - ../../.venv/lib/python3.11/site-packages:/usr/local/lib/python3.11/site-packages:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8060/health', timeout=5).read()"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  tts-service:
    image: python:3.11-slim
    working_dir: /app
    command: ["python", "-m", "uvicorn", "--app-dir", "services/tts-service", "main:app", "--host", "0.0.0.0", "--port", "8040"]
    env_file:
      - ../../.env
    environment:
      TTS_SERVICE_HOST: 0.0.0.0
      TTS_SERVICE_PORT: 8040
      TTS_SERVICE_BASE_URL: http://tts-service:8040
      TTS_CORS_ORIGINS: http://127.0.0.1:4173,http://localhost:4173,http://127.0.0.1:3000,http://localhost:3000
      TTS_STORAGE_ROOT: data/derived/tts_audio
    ports:
      - "8040:8040"
    volumes:
      - ../..:/app
      - ../../.venv/lib/python3.11/site-packages:/usr/local/lib/python3.11/site-packages:ro
      - tts_data:/app/data/derived/tts_audio
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8040/health', timeout=5).read()"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  orchestrator:
    image: python:3.11-slim
    working_dir: /app
    command: ["python", "-m", "uvicorn", "--app-dir", "apps/orchestrator", "main:app", "--host", "0.0.0.0", "--port", "8010"]
    environment:
      ORCHESTRATOR_HOST: 0.0.0.0
      ORCHESTRATOR_PORT: 8010
      ORCHESTRATOR_BASE_URL: http://orchestrator:8010
      ORCHESTRATOR_REQUEST_TIMEOUT_SECONDS: ${ORCHESTRATOR_REQUEST_TIMEOUT_SECONDS:-60}
      DIALOGUE_SERVICE_BASE_URL: http://dialogue-service:8030
      RAG_SERVICE_BASE_URL: http://rag-service:8070
    depends_on:
      rag-service:
        condition: service_healthy
      dialogue-service:
        condition: service_healthy
    ports:
      - "8010:8010"
    volumes:
      - ../..:/app
      - ../../.venv/lib/python3.11/site-packages:/usr/local/lib/python3.11/site-packages:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5).read()"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  gateway:
    image: python:3.11-slim
    working_dir: /app
    command: ["python", "-m", "uvicorn", "--app-dir", "apps/api-gateway", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-virtual_human}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-virtual_human}
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8000
      GATEWAY_PUBLIC_BASE_URL: ${GATEWAY_PUBLIC_BASE_URL:-http://localhost:8000}
      GATEWAY_WS_PATH: ${GATEWAY_WS_PATH:-/ws}
      GATEWAY_CORS_ORIGINS: http://127.0.0.1:4173,http://localhost:4173,http://127.0.0.1:3000,http://localhost:3000
      ORCHESTRATOR_BASE_URL: http://orchestrator:8010
      ORCHESTRATOR_REQUEST_TIMEOUT_SECONDS: ${ORCHESTRATOR_REQUEST_TIMEOUT_SECONDS:-60}
      AFFECT_SERVICE_BASE_URL: http://affect-service:8060
      TTS_SERVICE_BASE_URL: http://tts-service:8040
      MEDIA_STORAGE_ROOT: /app/data/derived/live_media
      SESSION_EXPORT_DIR: /app/data/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
      affect-service:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../..:/app
      - ../../.venv/lib/python3.11/site-packages:/usr/local/lib/python3.11/site-packages:ro
      - media_data:/app/data/derived/live_media
      - export_data:/app/data/exports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      gateway:
        condition: service_healthy
      affect-service:
        condition: service_healthy
      tts-service:
        condition: service_healthy
    ports:
      - "4173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  media_data:
  export_data:
  tts_data:
